<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    padding: 20px;
    color: #333;
    background-color: #fff;
  }
  h1, h2, h3, h4, h5, h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
  h3 { font-size: 1.25em; }
  p { margin-top: 0; margin-bottom: 16px; }
  code {
    padding: .2em .4em;
    margin: 0;
    font-size: 85%;
    background-color: rgba(27,31,35,.05);
    border-radius: 3px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  pre {
    padding: 16px;
    overflow: auto;
    font-size: 85%;
    line-height: 1.45;
    background-color: #f6f8fa;
    border-radius: 3px;
    margin-bottom: 16px;
  }
  pre code {
    background-color: transparent;
    padding: 0;
    font-size: 100%;
  }
  ul, ol {
    padding-left: 2em;
    margin-top: 0;
    margin-bottom: 16px;
  }
  li {
    margin-top: 0.25em;
  }
  a {
    color: #0366d6;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<textarea id="markdown-input" style="display:none;"></textarea>
<div id="markdown-output"></div>
<script>
function parseMarkdown(md) {
    var lines = md.split('\n');
    var html = [];
    var inCodeBlock = false;
    var codeContent = [];
    var inList = null;
    var paragraphBuffer = [];

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function parseInline(text) {
        text = escapeHtml(text);
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        return text;
    }

    function flushParagraph() {
        if (paragraphBuffer.length > 0) {
            html.push('<p>' + parseInline(paragraphBuffer.join(' ')) + '</p>');
            paragraphBuffer = [];
        }
    }

    function closeList() {
        if (inList) {
            html.push('</' + inList + '>');
            inList = null;
        }
    }

    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.endsWith('\r')) {
            line = line.substring(0, line.length - 1);
        }

        if (line.trim().indexOf('```') === 0) {
            flushParagraph();
            if (inCodeBlock) {
                html.push('<pre><code>' + escapeHtml(codeContent.join('\n')) + '</code></pre>');
                codeContent = [];
                inCodeBlock = false;
            } else {
                closeList();
                inCodeBlock = true;
            }
            continue;
        }

        if (inCodeBlock) {
            codeContent.push(line);
            continue;
        }

        var headerMatch = line.match(/^(#{1,6})\s+(.*)$/);
        if (headerMatch) {
            flushParagraph();
            closeList();
            var level = headerMatch[1].length;
            html.push('<h' + level + '>' + parseInline(headerMatch[2]) + '</h' + level + '>');
            continue;
        }

        var ulMatch = line.match(/^[\*\-\+]\s+(.*)$/);
        if (ulMatch) {
            flushParagraph();
            if (inList !== 'ul') {
                closeList();
                html.push('<ul>');
                inList = 'ul';
            }
            html.push('<li>' + parseInline(ulMatch[1]) + '</li>');
            continue;
        }

        var olMatch = line.match(/^(\d+)\.\s+(.*)$/);
        if (olMatch) {
            flushParagraph();
            if (inList !== 'ol') {
                closeList();
                html.push('<ol>');
                inList = 'ol';
            }
            html.push('<li>' + parseInline(olMatch[2]) + '</li>');
            continue;
        }

        if (line.trim() === '') {
            flushParagraph();
            closeList();
            continue;
        }

        closeList();
        paragraphBuffer.push(line.trim());
    }

    flushParagraph();
    closeList();

    if (inCodeBlock) {
        html.push('<pre><code>' + escapeHtml(codeContent.join('\n')) + '</code></pre>');
    }

    return html.join('\n');
}

function render() {
    var input = document.getElementById("markdown-input").value;
    var output = document.getElementById("markdown-output");
    output.innerHTML = parseMarkdown(input);
}
</script>
</body>
</html>
